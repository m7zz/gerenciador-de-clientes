<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página não encontrada</title>

    <link rel="stylesheet" href="/public/css/global.css" />
    <link rel="stylesheet" href="/public/css/not-found.css" />
  </head>
  <body class="not-found-page">

    <div class="not-found-wrapper">

      <!-- Número decorativo de fundo -->
      <span class="not-found-ghost" aria-hidden="true">404</span>

      <!-- Conteúdo principal -->
      <main class="not-found-card">
        <p class="not-found-eyebrow">Erro 404</p>
        <h1 class="not-found-title">Página não<br><em>encontrada</em></h1>
        <p class="not-found-description">
          O endereço que você acessou não existe ou foi movido.<br>
          Volte ao início e tente novamente.
        </p>

        <div class="not-found-actions">
          <a href="/" class="btn btn-primary">Ir para o início</a>
        </div>
      </main>

    </div>

  </body>
</html>
